# NCD State Nodal Portal — Style Configuration
# Values extracted from reference manual NCD State Nodal V1.0.1 (Spec Section C)

page:
  size: A4            # 11906 × 16838 twips (exact ISO A4)
  margin_top_cm: 2.54     # 1 inch = 1440 twips
  margin_bottom_cm: 2.54
  margin_left_cm: 2.54
  margin_right_cm: 2.54
  header_distance_twips: 708
  footer_distance_twips: 708

fonts:
  body_family: "Calibri"
  body_size_pt: 12
  heading_family: "Calibri Light"
  code_family: "Consolas"

colors:
  # Heading hierarchy (spec C)
  primary: "FF6600"       # Orange — Heading 1
  secondary: "008000"     # Green  — Heading 2
  tertiary: "2F5496"      # Blue   — Heading 3
  accent: "FF6600"        # Same as primary
  # Table
  table_header_bg: "2F5496"
  table_header_fg: "FFFFFF"
  table_zebra: "F2F2F2"
  # Body text
  body_text: "000000"
  muted: "44546A"         # Also used for Caption text
  # Caption
  caption_color: "44546A"

headings:
  h1_size_pt: 20
  h1_bold: true
  h1_color: primary        # FF6600 orange
  h1_before_pt: 12
  h1_after_pt: 6
  h2_size_pt: 16
  h2_bold: false           # Calibri Light is not bold
  h2_color: secondary      # 008000 green
  h2_before_pt: 10
  h2_after_pt: 4
  h3_size_pt: 14
  h3_bold: false
  h3_color: tertiary       # 2F5496 blue
  h3_before_pt: 8
  h3_after_pt: 4

numbering:
  section_format: '{n}'
  subsection_format: '{parent}.{n}'
  figure_prefix: "Figure"
  figure_format: '{fig}'
  table_prefix: "Table"
  table_format: '{tbl}'

figures:
  max_width_inches: 6.2    # Page width minus margins minus body indent
  max_height_inches: 7.5   # Cap for full-page captures
  caption_position: below
  caption_size_pt: 9
  caption_color: "44546A"
  border_enabled: true
  border_color: "AAAAAA"
  border_pt: 0.5

tables:
  header_bold: true
  header_bg: table_header_bg
  header_fg: table_header_fg
  zebra_striping: true
  zebra_color: table_zebra
  border_color: "CCCCCC"
  border_width_pt: 0.5
  cell_padding_pt: 4
  caption_position: above
  caption_size_pt: 9

fields:
  style: bullets
  # F1: bold field name, en-dash, sentence-case description
  bullet_format: "{name} \u2013 {utility}"
  lead_in: "Enter the following details:"

bullets:
  level_0_marker: "\u2022"
  level_1_marker: "\u25E6"
  level_2_marker: "\u25AA"
  indent_cm: 0.5

layout:
  page_break_per_screen: false
  body_left_indent_twips: 432   # 0.3 inch body indent (spec C)
  body_space_after_pt: 6
  body_line_spacing: 1.15
  body_justified: true

# Cover disabled — NCD reference starts with revision history
cover:
  enabled: false

header:
  mode: table             # logo (left) + doc title (right)
  logo_height_inches: 0.45
  right_text_pt: 8
  right_text_color: "666666"
  bottom_border: true
  bottom_border_color: "CCCCCC"

revision_history:
  header_bg: "2F5496"
  header_fg: "FFFFFF"
  border_color: "CCCCCC"
  columns:
    - Version
    - Date
    - Description
    - Prepared By
    - Reviewed By
    - Approved By

toc:
  title: "Table of Contents"
  max_depth: 3
  dot_leaders: true

annotations:
  mode: boxes_only
  wrap_chars: 14
  colors:
    filter_form: red
    action_button: red
    action_column: red
    table_header: red
    view_only: green
    page_header: blue
    navigation_bar: blue

footer:
  show_page_numbers: true
  page_number_format: "Page {current} of {total}"
  page_number_color: muted
  left_text_pt: 8
  left_text_color: "888888"

logo:
  path: "C:/Users/stadmin/Downloads/logo.png"
  # To make portable: copy logo to clients/ncd/assets/logo.png and update path above
