items:
  - "Agency specific Case Form for data entry."
  - "Advanced Search: Search cases using various details such as case number, party name, order date, and more."
  - "360-Degree Profile: Consolidate all data related to a person/entity for a comprehensive view of offences reported."
  - "Draft Saving Option: Save case details as draft before final submission for better record-keeping and review."
  - "Holistic Case Overview: View cases booked across various NCB offices in a unified manner."
  - "Hierarchical Structure: Facilitates controlled data sharing while restricting access based on user roles."
  - "User Management: Enables different levels of access for various stakeholders."
  - "Case sharing & Privacy Controls: Provides smooth sharing of cases to interested agencies. Also, allows agencies to manage case visibility, ensuring data security and confidentiality."
  - "By integrating these functionalities, NEOR enhances efficiency in Case Management, providing a streamlined approach for all stakeholders."
