  - "  Search & Seizure"
  - "  Investigation Report (IR)/ Complaint"
  - "  Trial & Conviction"
  - "  High Court"
  - "  Supreme Court"
  - "Sharing of Cases from one agency to other e.g.: NCB to CBI"
  - "Case form details can be downloaded using the pdf icon in pdf format from case list >> view >> detailed view."
