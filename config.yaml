provider: ollama
default_template: corporate
current_client: orangehrms
content_dir: content
clients_dir: clients
styles_dir: styles
sessions_dir: sessions
providers:
  browser:
    editor_command: notepad
  anthropic:
    api_key_env: ANTHROPIC_API_KEY
    model: claude-sonnet-4-6
    max_tokens: 8000
  openai_compat:
    api_key_env: OPENAI_API_KEY
    base_url: https://api.groq.com/openai/v1
    model: llama-3.3-70b-versatile
    max_tokens: 8000
  ollama:
    host: https://ollama.com
    model: gpt-oss:120b
    api_key_env: OLLAMA_API_KEY
    max_tokens: 8000
render:
  label_font_size: 20
  region_stroke_width: 3
  callout_border_width: 2
capture:
  mode: viewport
  scroll_capture: true
